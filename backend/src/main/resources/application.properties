# ============================================================
# PROFIL ACTIF: 'sqlserver' (SQL Server) ou 'h2' (H2 embarquée)
# ============================================================
spring.profiles.active=h2

# --- Configuration SQL Server (via application-sqlserver.properties) ---
# --- Configuration H2 (profil 'h2') ---
# spring.datasource.url=jdbc:h2:file:./data/driverhub;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Configuration du provider externe (si applicable)
external.provider.url=https://api.external-provider.com
external.provider.api-key=YOUR_API_KEY_HERE
external.provider.timeout=5000
external.provider.enabled=true

# OpenAI Whisper API (leave blank to use simulation)
openai.api.key=

# Ollama local LLM for Darija NLP fallback
ollama.enabled=true
ollama.url=http://localhost:11434
ollama.model=llama3.2:1b

# Configuration serveur
server.port=8080

# JWT
jwt.secret=DriverHubSecureAuthKey2024Minimum256BitsRequiredForHS256
jwt.expiration-ms=86400000

# Configuration upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# ? CORS pour React
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Email SMTP configuration (use environment variables for credentials)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM:no-reply@driverhub.ma}
spring.mail.enabled=${MAIL_ENABLED:false}

# MyGeotab IVMS integration
geotab.api.url=https://my.geotab.com/api/v1
geotab.sync.interval.ms=300000
geotab.sync.enabled=true

